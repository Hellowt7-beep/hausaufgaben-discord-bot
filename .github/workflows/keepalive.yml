name: Keepalive

on:
  schedule:
    # Alle 10 Minuten (Render schläft nach 15 Min)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Manuell auslösbar

jobs:
  keepalive:
    runs-on: ubuntu-latest
    
    steps:
    - name: Ping Render Service
      run: |
        # Ersetze DEINE_RENDER_URL mit deiner echten Render URL
        curl -f https://hausaufgaben-discord-bot.onrender.com/ping || exit 1
        echo "✅ Keepalive ping erfolgreich gesendet"
        
    - name: Log Status
      run: |
        echo "🕒 Keepalive ausgeführt um: $(date)"
        echo "🔄 Nächster Ping in 10 Minuten"